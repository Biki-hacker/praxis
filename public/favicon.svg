<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient matching the premium Cosmic Slate Theme -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#0e1726" />
      <stop offset="100%" stop-color="#030712" />
    </radialGradient>
    
    <!-- Primary Cyan/Teal Gradient for connection orbits and lines -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#0083b0" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Accent Emerald Gradient for civic resolution pulses -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- SVG soft drop shadow glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Squircle container base mimicking native macOS/iOS widgets -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="4" />

  <!-- Hexagonal guidelines grid representing civic structure -->
  <path d="M256,90 L390,167 L390,323 L256,400 L122,323 L122,167 Z" fill="none" stroke="#1e293b" stroke-dasharray="8,8" stroke-width="3" />

  <!-- Outer Ring representing community interaction loops -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#primaryGrad)" stroke-width="2" opacity="0.35" />
  
  <!-- Hyperlocal satellite node targets -->
  <circle cx="256" cy="66" r="8" fill="#06b6d4" />
  <circle cx="446" cy="256" r="8" fill="#10b981" />
  <circle cx="256" cy="446" r="8" fill="#0083b0" />
  <circle cx="66" cy="256" r="8" fill="#06b6d4" />

  <g filter="url(#glow)">
    <!-- Base Map Pin Loop -->
    <path d="M256,380 C180,280 160,240 160,180 C160,120 203,70 256,70 C309,70 352,120 352,180 C352,230 330,280 256,380 Z" 
          fill="none" 
          stroke="url(#primaryGrad)" 
          stroke-width="24" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Stylized "P" Stem -->
    <line x1="216" y1="130" x2="216" y2="300" stroke="#ffffff" stroke-width="24" stroke-linecap="round" />
    
    <!-- Stylized "P" loop -->
    <path d="M216,130 L270,130 C300,130 315,145 315,175 C315,205 300,220 270,220 L216,220" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="24" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- Core glowing node (pulse indicator) -->
    <circle cx="256" cy="175" r="14" fill="url(#accentGrad)" />
    <circle cx="256" cy="175" r="30" fill="none" stroke="url(#accentGrad)" stroke-width="4" opacity="0.6" />
  </g>

  <!-- Fine alignment ticks representing micro-targeting -->
  <line x1="256" y1="38" x2="256" y2="54" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" />
  <line x1="256" y1="458" x2="256" y2="474" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" />
  <line x1="38" y1="256" x2="54" y2="256" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" />
  <line x1="458" y1="256" x2="474" y2="256" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" />
</svg>
